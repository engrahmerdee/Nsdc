{% extends 'base.html' %}
{% block title %}Edit Profile — NSDCP{% endblock %}
{% block content %}
<div class="content-wrap narrow">
  <div class="page-back"><a href="{{ url_for('auth.profile', user_id=current_user.id) }}"><i class="fas fa-arrow-left"></i> Back to Profile</a></div>
  <div class="form-card">
    <h2><i class="fas fa-user-edit" style="color:var(--green)"></i> Edit Profile</h2>
    <form method="POST" enctype="multipart/form-data" class="form-styled">
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:8px">
        <img src="{{ url_for('static', filename='uploads/' + current_user.profile_pic) }}"
             onerror="this.src='https://ui-avatars.com/api/?name={{ current_user.full_name|urlencode }}&background=1a6b3c&color=fff&size=80'"
             style="width:80px;height:80px;border-radius:50%;object-fit:cover" id="av-preview" alt="">
        <label class="btn btn-outline btn-sm"><i class="fas fa-camera"></i> Change Photo
          <input type="file" name="profile_pic" accept="image/*" style="display:none" onchange="var r=new FileReader();r.onload=function(e){document.getElementById('av-preview').src=e.target.result};r.readAsDataURL(this.files[0])">
        </label>
      </div>
      <div class="form-group"><label>Bio</label><textarea name="bio" rows="3" placeholder="Tell other students about yourself...">{{ current_user.bio or '' }}</textarea></div>
      <div class="form-row2">
        <div class="form-group"><label>Town / LGA</label><input type="text" name="town_lga" value="{{ current_user.town_lga or '' }}"></div>
        <div class="form-group"><label>Faculty</label><input type="text" name="faculty" value="{{ current_user.faculty or '' }}"></div>
      </div>
      <div class="form-group"><label>Department</label><input type="text" name="department" value="{{ current_user.department or '' }}"></div>
      <div class="form-group"><label>Residential Address</label><textarea name="residential_address" rows="2">{{ current_user.residential_address or '' }}</textarea></div>
      <div style="border-top:1px solid var(--border);padding-top:16px;margin-top:4px">
        <p style="font-size:13px;font-weight:700;color:var(--green);margin-bottom:12px"><i class="fas fa-lock"></i> Identity Verification (Encrypted — Never Publicly Visible)</p>
        <div class="form-row2">
          <div class="form-group"><label>NIN</label><input type="text" name="nin" placeholder="{{ '(already saved)' if current_user.nin else 'Enter NIN (optional)' }}" maxlength="11"></div>
          <div class="form-group"><label>School Reg. Number</label><input type="text" name="school_reg" placeholder="{{ '(already saved)' if current_user.school_reg else 'Enter Reg No (optional)' }}"></div>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Save Changes</button>
    </form>
  </div>
</div>{% endblock %}
