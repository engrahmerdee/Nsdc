{% extends 'base.html' %}
{% block title %}Create Poll — NSDCP{% endblock %}
{% block content %}
<div class="content-wrap narrow">
  <div class="page-back"><a href="{{ url_for('polls.index') }}"><i class="fas fa-arrow-left"></i> Back</a></div>
  <div class="form-card">
    <h2><i class="fas fa-poll-h" style="color:var(--green)"></i> Create New Poll</h2>
    <form method="POST" class="form-styled">
      <div class="form-group"><label>Question <span class="req">*</span></label><input type="text" name="question" required placeholder="What do you want students to vote on?" maxlength="300"></div>
      <div class="form-group"><label>Description (optional)</label><textarea name="description" rows="2" placeholder="Provide context for this poll..."></textarea></div>
      <div class="form-group"><label>Options <span class="req">*</span> (min 2)</label>
        <div id="opts"><input type="text" name="options" required placeholder="Option 1" style="margin-bottom:8px"><input type="text" name="options" required placeholder="Option 2"></div>
        <button type="button" class="btn btn-outline btn-sm mt" onclick="addOpt()">+ Add Option</button>
      </div>
      <div class="form-row2">
        <div class="form-group"><label>Poll Ends At <span class="req">*</span></label><input type="datetime-local" name="ends_at" required></div>
        <div class="form-group"><label>Show live results?</label><label class="check-label" style="margin-top:10px"><input type="checkbox" name="show_live" checked> Show results while poll is open</label></div>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create Poll</button>
    </form>
  </div>
</div>
<script>
var n=2;function addOpt(){n++;var d=document.getElementById('opts'),i=document.createElement('input');i.type='text';i.name='options';i.placeholder='Option '+n;i.style.marginTop='8px';d.appendChild(i);}
</script>{% endblock %}
